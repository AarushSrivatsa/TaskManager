<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taskflow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c6aff;
    --accent2: #ff6a8e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #4ade80;
    --error: #ff6a8e;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  .bg-glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,255,0.12) 0%, transparent 70%);
    top: -100px; left: -100px;
    pointer-events: none;
    animation: driftGlow 8s ease-in-out infinite alternate;
  }

  .bg-glow2 {
    position: fixed;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,106,142,0.08) 0%, transparent 70%);
    bottom: -50px; right: -50px;
    pointer-events: none;
    animation: driftGlow2 10s ease-in-out infinite alternate;
  }

  @keyframes driftGlow {
    from { transform: translate(0, 0); }
    to { transform: translate(80px, 60px); }
  }
  @keyframes driftGlow2 {
    from { transform: translate(0, 0); }
    to { transform: translate(-60px, -40px); }
  }

  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 12px var(--accent); }
    50% { box-shadow: 0 0 24px var(--accent), 0 0 40px rgba(124,106,255,0.3); }
  }

  .tagline {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .tabs {
    display: flex;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .form-section { display: none; }
  .form-section.active { display: block; }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,255,0.1);
  }

  input::placeholder { color: var(--muted); }

  .role-select {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .role-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .role-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,255,0.08);
  }

  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn:hover { background: #6b59ee; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .alert {
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .alert.error { background: rgba(255,106,142,0.1); border: 1px solid rgba(255,106,142,0.3); color: var(--error); }
  .alert.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
  .alert.show { display: block; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="container">
  <div class="logo">
    <div class="logo-dot"></div>
    Taskflow
  </div>
  <div class="tagline">Task management system</div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Login -->
    <div id="login-section" class="form-section active">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
      <button class="btn" id="login-btn" onclick="handleLogin()">
        <span id="login-text">Sign in</span>
        <div class="btn-spinner" id="login-spinner"></div>
      </button>
    </div>

    <!-- Register -->
    <div id="register-section" class="form-section">
      <div class="field">
        <label>I am a</label>
        <div class="role-select">
          <div class="role-btn selected" id="role-employee" onclick="selectRole('employee')">Employee</div>
          <div class="role-btn" id="role-manager" onclick="selectRole('manager')">Manager</div>
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters"/>
      </div>
      <button class="btn" id="reg-btn" onclick="handleRegister()">
        <span id="reg-text">Create account</span>
        <div class="btn-spinner" id="reg-spinner"></div>
      </button>
    </div>
  </div>
</div>

<script>
  const API = '';
  let selectedRole = 'employee';

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-employee').classList.toggle('selected', role === 'employee');
    document.getElementById('role-manager').classList.toggle('selected', role === 'manager');
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('login-section').classList.toggle('active', tab === 'login');
    document.getElementById('register-section').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert ${type} show`;
  }

  function hideAlert() {
    document.getElementById('alert').className = 'alert';
  }

  function setLoading(prefix, loading) {
    document.getElementById(`${prefix}-btn`).disabled = loading;
    document.getElementById(`${prefix}-text`).style.display = loading ? 'none' : 'inline';
    document.getElementById(`${prefix}-spinner`).style.display = loading ? 'block' : 'none';
  }

  function parseRole(token) {
    try {
      return JSON.parse(atob(token.split('.')[1])).role;
    } catch { return null; }
  }

  function saveTokens(data) {
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return showAlert('Please fill in all fields.', 'error');

    setLoading('login', true);
    hideAlert();

    // Try employee first, then manager
    let data = null;
    let res = await fetch(`${API}/api/v1/employee/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    if (!res.ok) {
      res = await fetch(`${API}/api/v1/manager/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
    }

    setLoading('login', false);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return showAlert(err.detail || 'Invalid credentials.', 'error');
    }

    data = await res.json();
    saveTokens(data);
    const role = parseRole(data.access_token);
    window.location.href = role === 'manager' ? '/static/manager.html' : '/static/employee.html';
  }

  async function handleRegister() {
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!email || !password) return showAlert('Please fill in all fields.', 'error');

    setLoading('reg', true);
    hideAlert();

    const endpoint = selectedRole === 'manager' ? '/api/v1/manager/register' : '/api/v1/employee/register';
    const res = await fetch(`${API}${endpoint}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    setLoading('reg', false);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return showAlert(err.detail || 'Registration failed.', 'error');
    }

    const data = await res.json();
    saveTokens(data);
    window.location.href = selectedRole === 'manager' ? '/static/manager.html' : '/static/employee.html';
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('login-section').classList.contains('active')) handleLogin();
    else handleRegister();
  });
</script>
</body>
</html>
